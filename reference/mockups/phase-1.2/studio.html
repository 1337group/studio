<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Goa · Studio</title>
<link rel="stylesheet" href="globals.css" />
<style>
  body { background: oklch(94% 0.005 240); margin: 0; }
  [data-goa-theme="dark"] body, body[data-host-dark] { background: oklch(8% 0.010 250); }
  .page-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    padding: 14px 24px;
    background: color-mix(in oklab, var(--goa-bg) 88%, transparent);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--goa-line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .page-header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin: 0; color: var(--goa-fg); }
  .page-header p  { font-size: 12px; color: var(--goa-fg-3); margin: 2px 0 0; max-width: 820px; }
  .canvas-wrap { padding-top: 64px; height: 100vh; box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/tokens.jsx"></script>
<script type="text/babel" src="components/wallpapers.jsx"></script>
<script type="text/babel" src="components/chrome.jsx"></script>
<script type="text/babel" src="components/goa-shell.jsx"></script>
<script type="text/babel" src="components/feedback-bot.jsx"></script>
<script type="text/babel" src="components/ask-goa.jsx"></script>
<script type="text/babel" src="components/design-canvas.jsx"></script>
<script type="text/babel" src="components/studio-data.jsx"></script>
<script type="text/babel" src="components/studio-panes.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [theme, setTheme] = useState('light');
  useEffect(() => {
    document.documentElement.setAttribute('data-goa-theme', theme);
    if (typeof applyGoaWallpaper === 'function') applyGoaWallpaper('graphite', theme === 'dark');
  }, [theme]);

  return (
    <>
      <header className="page-header">
        <div>
          <h1>Studio · build apps for the workspace</h1>
          <p>Surface 9 — claude.ai-style chat-on-left + canvas-on-right. Two on-ramps: <b>fork an existing app</b> (browse → propose changes, the meat) or <b>build from scratch</b> (your own Docker workspace, Hive backend wired). Submit fork → Allan reviews → ship to dev → beta → prod. Goa is the coach — asks about the problem, then writes the code with you.</p>
        </div>
        <GoaWordmark size={14} />
      </header>

      <div className="canvas-wrap" data-screen-label="Studio">
        <DesignCanvas>

          <DCSection id="propose" title="Fork & propose changes (the hero)" subtitle="Maria has forked Renewals desk to add Spanish-first letters. Goa coached her through the prompt edit; preview re-renders live; she can flip to diff or test results before submitting for review.">

            <DCArtboard id="propose" label="01 · Studio · Fork & propose changes (hero)" width={1480} height={920}>
              <StdPropose />
            </DCArtboard>

          </DCSection>

          <DCSection id="browse" title="Browse before forking" subtitle="Read-only, friendly entry point. Plain-English explanation of how the app works + sample run. Big primary action: 'Fork & propose changes.'">

            <DCArtboard id="app-detail" label="02 · Studio · App detail (read-only)" width={1480} height={920}>
              <StdAppDetail />
            </DCArtboard>

          </DCSection>

          <DCSection id="scratch" title="Build from scratch" subtitle="Empty canvas with starter prompts. Goa-as-coach picks up the conversation; canvas fills as the app takes shape.">

            <DCArtboard id="scratch" label="03 · Studio · Build from scratch" width={1480} height={920}>
              <StdScratch />
            </DCArtboard>

          </DCSection>

          <DCSection id="launch" title="Launch · Dev → Beta → Prod" subtitle="Once a from-scratch app is ready, walk it through three lifecycle stages. Pick beta testers from Library; Hive env vars auto-injected; Allan still gates the production cutover.">

            <DCArtboard id="launch" label="04 · Studio · Launch stepper" width={1240} height={1080}>
              <StdLaunch />
            </DCArtboard>

          </DCSection>

          <DCSection id="review" title="Allan's review queue" subtitle="Owner-only. PRs from the workspace land here. Diff + tests + affected-user count + approve / request-changes in one pane. Same chrome as Studio so the loop stays cohesive.">

            <DCArtboard id="review" label="05 · Studio · Review queue (Allan's view)" width={1480} height={920}>
              <StdReview />
            </DCArtboard>

          </DCSection>

        </DesignCanvas>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
